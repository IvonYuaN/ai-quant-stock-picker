# Vibe-Research candidate production entry. Include this file instead of
# aqsp-dashboard.conf; never include both because both define location /.

# Keep the backend health probe unauthenticated. The application itself
# intentionally exempts /api/health from VR_API_KEY checks.
location = /api/health {
    proxy_pass http://127.0.0.1:8900/api/health;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $http_connection;
    proxy_buffering off;
    proxy_cache off;
}

# Keep the prefix boundary explicit: /api belongs to FastAPI, while /apix does
# not accidentally become an API route.
location = /api {
    proxy_pass http://127.0.0.1:8900/api;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header Authorization $http_authorization;
    proxy_set_header Cookie $http_cookie;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $http_connection;
    proxy_buffering off;
    proxy_cache off;
}

# API paths are preserved without a URI suffix rewrite. This keeps /api/*
# same-origin for React and allows FastAPI to enforce VR_API_KEY itself.
location ^~ /api/ {
    proxy_pass http://127.0.0.1:8900;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header Authorization $http_authorization;
    proxy_set_header Cookie $http_cookie;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $http_connection;
    proxy_read_timeout 300s;
    proxy_send_timeout 60s;
    proxy_connect_timeout 10s;
    proxy_request_buffering off;
    proxy_buffering off;
    proxy_cache off;
}

# Vite preview serves the built static files and owns the SPA history fallback.
# The error_page is a second line of defence for a preview implementation that
# returns 404 for a client-side route such as /daily-review.
location ^~ /assets/ {
    proxy_pass http://127.0.0.1:5899;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $http_connection;
    proxy_cache off;
    proxy_hide_header Cache-Control;
    add_header Cache-Control "public, max-age=3600" always;
}

# Retire old AQSP dashboard, beginner and agent URLs explicitly. 302 is
# intentional during cutover: browsers do not pin the destination, so rollback
# remains possible without waiting for permanent-redirect caches to expire.
location ~ ^/(?:dist/)?dashboard(?:/|$|\.html$) {
    return 302 /$is_args$args;
}

location ~ ^/(?:beginner|agent|agents|dashboard_beginner)(?:/|$|\.html$|\.py$) {
    return 302 /$is_args$args;
}

location = /archive.html {
    return 302 /$is_args$args;
}

# React BrowserRouter routes must reach the Vite preview. Do not add proxy
# caching here: index.html is the release
# switch and must be revalidated after each frontend deployment.
location / {
    proxy_pass http://127.0.0.1:5899;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $http_connection;
    proxy_read_timeout 60s;
    proxy_send_timeout 60s;
    proxy_connect_timeout 10s;
    proxy_buffering off;
    proxy_cache off;
    proxy_intercept_errors on;
    error_page 404 =200 /index.html;
    proxy_hide_header Cache-Control;
    add_header Cache-Control "no-cache" always;
}
