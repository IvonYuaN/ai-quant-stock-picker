# AQSP production Dashboard. BaoTa includes this file in the lh.ifidy.cn vhost.
location ^~ /_stcore/stream {
    proxy_pass http://127.0.0.1:8501/_stcore/stream;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 86400;
    proxy_send_timeout 86400;
    proxy_connect_timeout 60;
    proxy_buffering off;
    proxy_cache off;
}

location ^~ /_stcore/health {
    proxy_pass http://127.0.0.1:8501/_stcore/health;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_buffering off;
    proxy_cache off;
}

# Streamlit is served at the domain root. Sending these historical paths to the
# upstream directly breaks its internal /_stcore endpoints.
location = /dashboard { return 302 /$is_args$args; }
location = /dashboard/ { return 302 /$is_args$args; }
location = /dist/dashboard { return 302 /$is_args$args; }
location = /dist/dashboard/ { return 302 /$is_args$args; }
location = /dist/dashboard/index.html { return 302 /$is_args$args; }
location = /dist/dashboard/archive.html { return 302 /$is_args$args; }
location = /dist/dashboard/agents.html { return 302 /$is_args$args; }
location = /agents.html { return 302 /$is_args$args; }
location = /dashboard_beginner { return 302 /$is_args$args; }
location = /dashboard_beginner.py { return 302 /$is_args$args; }
location = /archive.html { return 302 /$is_args$args; }

# Retire legacy beginner/agent URL families.  Do not intercept /static: it is
# also Streamlit's live asset namespace and must reach the upstream unchanged.
location ~ ^/(?:dashboard/)?(?:beginner|agent|agents|dashboard_beginner)(?:/|$|\.html$|\.py$) {
    return 302 /$is_args$args;
}

location / {
    proxy_pass http://127.0.0.1:8501;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 86400;
    proxy_send_timeout 86400;
    proxy_connect_timeout 60;
    proxy_buffering off;
    proxy_cache off;
}
