name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "feat/**"
      - "fix/**"
      - "codex/**"

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[data,dev]"

      - name: Ruff
        run: ruff check .

      - name: Tests
        run: pytest -q

      - name: Secret scan
        run: python3 scripts/check_no_secrets.py .

      - name: Upload preflight
        run: python3 -m scripts.preflight_upload
