name: CI

on:
  pull_request:
    paths:
      - "src/**"
      - "scripts/**"
      - "tests/**"
      - "backend/**"
      - "frontend/**"
      - "pyproject.toml"
      - ".github/workflows/**"
  push:
    branches:
      - main
      - "feat/**"
      - "fix/**"
      - "codex/**"
      - "test/**"
    paths:
      - "src/**"
      - "scripts/**"
      - "tests/**"
      - "backend/**"
      - "frontend/**"
      - "pyproject.toml"
      - ".github/workflows/**"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    strategy:
      fail-fast: false
      matrix:
        shard: [0, 1, 2, 3]
    name: verify (shard ${{ matrix.shard }})
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Upload preflight
        run: python3 -m scripts.preflight_upload

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[data,dev,web,api]"

      - name: Ruff
        run: ruff check .

      - name: Frontend build
        run: |
          npm ci --prefix frontend
          npm run build --prefix frontend

      - name: Tests
        env:
          PYTHONFAULTHANDLER: "1"
          PYTEST_SHARD: ${{ matrix.shard }}
          PYTEST_TOTAL_SHARDS: 4
        run: |
          python3 - <<'PY' > /tmp/aqsp-test-files.txt
          import os
          from pathlib import Path

          shard = int(os.environ["PYTEST_SHARD"])
          total = int(os.environ["PYTEST_TOTAL_SHARDS"])
          paths = sorted(Path("tests").rglob("test_*.py"))
          paths += sorted(Path("backend/tests").rglob("test_*.py"))
          print("\n".join(str(path) for index, path in enumerate(paths) if index % total == shard))
          PY
          pytest -q -vv --durations=20 -o faulthandler_timeout=120 $(cat /tmp/aqsp-test-files.txt)

      - name: Secret scan
        run: python3 scripts/check_no_secrets.py .
