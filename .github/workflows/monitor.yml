name: Monitor
on:
  schedule:
    - cron: '*/30 * * * *'  # 北京时间每30分钟
  workflow_dispatch:

concurrency:
  group: monitor-${{ github.workflow }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: pip install -e ".[data]"
      - run: aqsp monitor --notify --notify-critical-only
