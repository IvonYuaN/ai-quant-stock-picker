name: Monitor
on:
  schedule:
    - cron: '*/30 * * * *'  # 北京时间每30分钟
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e ".[data]"
      - run: aqsp monitor --notify