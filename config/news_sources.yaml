version: "2026.07.19"

rss:
  enabled: true
  # RSS must return before the outer composite/news deadline so partial feeds
  # can still reach the short-term decision surface.
  timeout_seconds: 5.5
  # 单个 feed 的超时不应按 feed 数量累加到盘中主链。
  max_concurrency: 11
  max_items: 12
  # 默认只启用当前可验证的官方/原生 RSS，避免把失效公共 RSSHub 实例放入生产默认链路。
  feeds:
    - name: 美联储-FederalReserve
      url: "https://www.federalreserve.gov/feeds/press_all.xml"
      category: "global_macro"
      region: international
      enabled: true
      keywords: ["rate", "inflation", "liquidity", "美元", "美债", "流动性"]
      max_items: 8
    - name: 美国SEC-PressReleases
      url: "https://www.sec.gov/news/pressreleases.rss"
      category: "global_regulation"
      region: international
      enabled: true
      keywords: ["SEC", "regulation", "listing", "disclosure", "IPO", "上市", "监管"]
      max_items: 8
    - name: 欧洲央行-ECB
      url: "https://www.ecb.europa.eu/rss/press.html"
      category: "global_macro"
      region: international
      enabled: true
      keywords: ["rate", "inflation", "euro", "liquidity", "欧元", "流动性"]
      max_items: 8
    - name: 英伟达-NVIDIADeveloper
      url: "https://developer.nvidia.com/blog/feed/"
      category: "global_tech"
      region: international
      enabled: true
      keywords: ["NVIDIA", "Physical AI", "robotics", "机器人", "具身智能", "AI算力"]
      max_items: 8
    - name: 英伟达-NVIDIA Newsroom
      url: "https://nvidianews.nvidia.com/rss.xml"
      category: "global_tech"
      region: international
      enabled: true
      keywords: ["NVIDIA", "Blackwell", "AI", "robotics", "机器人", "数据中心"]
      max_items: 6
    - name: AMD-PressReleases
      url: "https://ir.amd.com/news-events/press-releases/rss"
      category: "global_tech"
      region: international
      enabled: true
      keywords: ["AMD", "Instinct", "EPYC", "AI", "data center", "服务器"]
      max_items: 6
    - name: Intel-PressReleases
      url: "https://www.intc.com/news-events/press-releases/rss"
      category: "global_tech"
      region: international
      enabled: true
      keywords: ["Intel", "foundry", "Gaudi", "AI", "先进封装", "半导体"]
      max_items: 6
    - name: OpenAI-News
      url: "https://openai.com/news/rss.xml"
      category: "global_tech"
      region: international
      enabled: true
      keywords: ["OpenAI", "GPT", "AI", "model", "physical AI", "人工智能"]
      max_items: 6
    - name: NASA-NewsReleases
      url: "https://www.nasa.gov/news-release/feed/"
      category: "global_aerospace"
      region: international
      enabled: true
      keywords: ["NASA", "SpaceX", "space", "satellite", "launch", "rocket", "commercial space", "商业航天", "卫星互联网"]
      max_items: 8
    - name: MarketWatch-RealTimeHeadlines
      url: "https://feeds.content.dowjones.io/public/rss/mw_realtimeheadlines"
      category: "global_risk_appetite"
      region: international
      enabled: true
      keywords: ["Nasdaq", "S&P 500", "Dow", "stock futures", "rally", "risk-on", "tech stocks", "AI stocks", "美股", "纳斯达克", "风险偏好"]
      max_items: 8
    - name: MarketWatch-MarketPulse
      url: "https://feeds.content.dowjones.io/public/rss/mw_marketpulse"
      category: "global_cross_asset"
      region: international
      enabled: true
      keywords: ["gold", "oil", "crude", "war", "attack", "Iran", "Middle East", "geopolitical", "defense", "SpaceX", "IPO", "satellite", "launch", "黄金", "原油", "战争", "地缘", "军工", "商业航天"]
      max_items: 8

    - name: 新华社-国内要闻
      url: "https://www.news.cn/rss/news.xml"
      category: "domestic_industry_news"
      region: domestic
      enabled: true
      themes: [policy_regulation, low_altitude_robotics, semiconductor_ai, new_energy_storage, rare_earth_magnet, shipping_defense]
      keywords: ["产业链", "供应链", "订单", "扩产", "需求", "政策"]
      max_items: 10

domestic:
  enabled: true
  # Eastmoney 公开搜索只作国内新闻/主题发现适配器；结果保留原始文章来源，
  # 政策判断仍需回看上面的官方 RSS 或企业公告。
  timeout_seconds: 5.5
  # 中国政府网官方 RSS：只作政策原文发现入口，单条 feed 失败会进入
  # NewsSourceHealth，不会由 RSS 适配器补造新闻。
  feeds:
    - name: 中国政府网-国务院政策
      url: "https://www.gov.cn/pushinfo/v150.xml"
      category: "domestic_policy"
      region: domestic
      enabled: true
      themes: [policy_regulation, equipment_update, low_altitude_robotics]
      keywords: ["政策", "国务院", "设备更新", "低空经济", "机器人", "人工智能", "新能源", "半导体", "算力", "储能"]
      max_items: 10
    - name: 中国政府网-部门政务
      url: "https://www.gov.cn/pushinfo/v151.xml"
      category: "domestic_industry_policy"
      region: domestic
      enabled: true
      themes: [policy_regulation, semiconductor_ai, new_energy_storage, rare_earth_magnet]
      keywords: ["工信部", "发改委", "政策", "产业", "半导体", "算力", "储能", "锂电", "稀土", "磁材", "通信"]
      max_items: 10
  themes:
    - id: policy_regulation
      query: "政策 监管 产业支持"
      keywords: ["政策", "监管", "产业支持"]
    - id: equipment_update
      query: "设备更新 以旧换新"
      keywords: ["设备更新", "以旧换新"]
    - id: low_altitude_robotics
      query: "低空经济 机器人 具身智能"
      keywords: ["低空经济", "机器人", "具身智能"]
    - id: semiconductor_ai
      query: "半导体 芯片 AI算力 光模块"
      keywords: ["半导体", "芯片", "AI算力", "光模块"]
    - id: new_energy_storage
      query: "锂电 储能 电网 充电桩"
      keywords: ["锂电", "储能", "电网", "充电桩"]
    - id: rare_earth_magnet
      query: "稀土 磁材 氧化镨钕"
      keywords: ["稀土", "磁材", "氧化镨钕"]
    - id: shipping_defense
      query: "航运 军工 黄金 原油"
      keywords: ["航运", "军工", "黄金", "原油"]