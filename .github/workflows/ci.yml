name: CI

on:
  pull_request:
    paths:
      - "src/**"
      - "scripts/**"
      - "tests/**"
      - "backend/**"
      - "frontend/**"
      - "deploy/baota/**"
      - "deploy/nginx/**"
      - "deploy/systemd/**"
      - "pyproject.toml"
      - ".github/workflows/**"
  push:
    branches:
      - main
      - "feat/**"
      - "fix/**"
      - "codex/**"
      - "test/**"
    paths:
      - "src/**"
      - "scripts/**"
      - "tests/**"
      - "backend/**"
      - "frontend/**"
      - "deploy/baota/**"
      - "deploy/nginx/**"
      - "deploy/systemd/**"
      - "pyproject.toml"
      - ".github/workflows/**"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    strategy:
      fail-fast: false
      matrix:
        shard: [0, 1, 2, 3]
    name: verify (shard ${{ matrix.shard }})
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Upload preflight
        run: python3 -m scripts.preflight_upload

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[data,dev,web,api]"

      - name: Ruff
        run: ruff check .

      - name: Frontend build
        run: |
          npm ci --prefix frontend
          npm run build --prefix frontend

      - name: Check AQSP deployment bundle
        run: |
          python3 - <<'PY'
          from pathlib import Path

          root = Path.cwd()
          bundle = root / "frontend" / "dist" / "index.html"
          html = bundle.read_text(encoding="utf-8")
          assert "AQSP" in html, "frontend bundle is missing the AQSP entry"
          assert any((bundle.parent / "assets").iterdir()), "frontend bundle has no assets"

          api_service = (root / "deploy/systemd/aqsp-vibe-research-api.service").read_text(encoding="utf-8")
          preview_service = (root / "deploy/systemd/aqsp-vibe-research-preview.service").read_text(encoding="utf-8")
          nginx = (root / "deploy/nginx/vibe-research-mainline.conf").read_text(encoding="utf-8")
          env = (root / "deploy/systemd/aqsp-vibe-research.env.example").read_text(encoding="utf-8")

          assert "-m uvicorn app:app --host 127.0.0.1 --port 8900" in api_service
          assert "run preview -- --host 127.0.0.1 --port 5899 --strictPort" in preview_service
          assert "VIBE_RESEARCH_BACKEND_PORT=8900" in env
          assert "VIBE_RESEARCH_FRONTEND_PORT=5899" in env
          assert "proxy_pass http://127.0.0.1:8900" in nginx
          assert "proxy_pass http://127.0.0.1:5899" in nginx
          assert "location = /api/health" in nginx
          print(f"validated static entry: {bundle}")
          print("validated AQSP API 127.0.0.1:8900 and frontend 127.0.0.1:5899")
          PY

      - name: Tests
        env:
          PYTHONFAULTHANDLER: "1"
          PYTEST_SHARD: ${{ matrix.shard }}
          PYTEST_TOTAL_SHARDS: 4
        run: |
          python3 -m pytest --collect-only -q -m "not live" tests backend/tests > /tmp/aqsp-all-test-nodes.txt
          python3 - <<'PY' > /tmp/aqsp-test-nodes.txt
          import os
          from pathlib import Path

          shard = int(os.environ["PYTEST_SHARD"])
          total = int(os.environ["PYTEST_TOTAL_SHARDS"])
          lines = [
              line.strip()
              for line in Path("/tmp/aqsp-all-test-nodes.txt")
              .read_text(encoding="utf-8")
              .splitlines()
              if "::" in line
          ]
          print("\n".join(line for index, line in enumerate(lines) if index % total == shard))
          PY
          TEST_NODES=()
          while IFS= read -r node; do
            [[ -n "${node}" ]] && TEST_NODES+=("${node}")
          done < /tmp/aqsp-test-nodes.txt
          pytest -q -vv -m "not live" --durations=20 -o faulthandler_timeout=120 "${TEST_NODES[@]}"

      - name: Secret scan
        run: python3 scripts/check_no_secrets.py .
