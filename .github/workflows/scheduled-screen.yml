name: Scheduled Stock Screening

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "open or close"
        required: false
        default: "close"

concurrency:
  group: scheduled-screen-${{ github.workflow }}-${{ github.event.schedule || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  screen:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      AQSP_SYMBOLS: ${{ vars.AQSP_SYMBOLS }}
      AQSP_MODE: ${{ github.event.inputs.mode || vars.AQSP_MODE || (github.event.schedule == '10 1 * * 1-5' && 'open' || 'close') }}
      AQSP_LIMIT: ${{ vars.AQSP_LIMIT || '10' }}
      AQSP_MIN_AVG_AMOUNT: ${{ vars.AQSP_MIN_AVG_AMOUNT || '50000000' }}
      AQSP_MAX_DATA_LAG_DAYS: ${{ vars.AQSP_MAX_DATA_LAG_DAYS || '3' }}
      AQSP_LEDGER: data/predictions.jsonl
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[data]"

      - name: Run screen report-only
        run: |
          set +e
          aqsp run \
            --mode "${AQSP_MODE}" \
            --symbols "${AQSP_SYMBOLS}" \
            --limit "${AQSP_LIMIT}" \
            --min-avg-amount "${AQSP_MIN_AVG_AMOUNT}" \
            --max-data-lag-days "${AQSP_MAX_DATA_LAG_DAYS}" \
            --ledger "${AQSP_LEDGER}" \
            --report "reports/${AQSP_MODE}.md" \
            --output-csv "reports/${AQSP_MODE}.csv"
          RUN_STATUS=$?
          set -e
          if [ "$RUN_STATUS" -eq 2 ]; then
            echo "aqsp run returned 2: circuit breaker active; continue notification workflow for visibility."
          elif [ "$RUN_STATUS" -ne 0 ]; then
            exit "$RUN_STATUS"
          fi

      - name: Verify no private artifacts are uploaded
        if: always()
        run: |
          echo "Reports and ledgers stay inside the runner and are not uploaded."
