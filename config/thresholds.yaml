version: "1.0.0"
effective_from: ""  # walk-forward DSR>1.0 + PBO<0.5 通过后填当天日期（宪法 §1.3 #15）
last_walkforward_run: "2026-05-28"  # 真跑 aqsp walkforward --update-yaml 后会自动写入
description: "策略阈值配置 — version 回退至 1.0.0：先前 2.0.0 升号无 walk-forward 验证依据"

momentum:
  lookback_days: 60
  min_returns: 0.05
  max_volatility: 0.3
  rsi_overbought: 70
  rsi_oversold: 30
  ma_period: 20
  trend_strength_threshold: 0.5
  weights:
    momentum: 0.4
    trend: 0.3
    rsi: 0.3

quality:
  enabled: false
  min_roe: 0.1
  min_roa: 0.05
  max_debt_ratio: 0.6
  min_cash_flow: 0.0
  operating_margin_threshold: 0.05
  eps_growth_min: 0.1
  weights:
    roe: 0.3
    roa: 0.25
    debt: 0.25
    margin: 0.2

value:
  enabled: false
  max_pe: 30
  max_pb: 5
  min_dividend_yield: 0.02
  ev_ebitda_max: 15
  price_sales_max: 3
  weights:
    pe: 0.4
    pb: 0.3
    dividend: 0.3

composite:
  momentum_weight: 0.5
  quality_weight: 0.25
  value_weight: 0.25
  min_total_score: 0.4

risk:
  max_drawdown: 0.2
  volatility_limit: 0.4
  liquidity_threshold: 1000000

filter:
  min_days_listed: 90
  min_price: 1.0
  max_price: 1000.0
  min_avg_volume: 1000000

execution:
  limit_up_tolerance: 0.005
  limit_down_tolerance: 0.005
  slippage: 0.002
  commission_rate: 0.0003

regime:
  volatility_high: 0.3
  momentum_bull: 0.1
  momentum_bear: -0.1
  trend_bull: 0.02
  trend_bear: -0.02
  confidence_volatility: 0.2
  confidence_trend: 0.01
  confidence_momentum: 0.05
  min_sample_size: 20
  cooldown_hours: 24
  adjustments:
    stable_bull: 1.1
    volatile_bull: 0.9
    stable_bear: 0.8
    volatile_bear: 0.6
    stable_sideways: 0.95
    volatile_sideways: 0.85
