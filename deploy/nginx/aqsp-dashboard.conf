# Compatibility name for existing BaoTa/Nginx includes.
# Keep this file aligned with vibe-research-mainline.conf: the root is React
# and the API is FastAPI; the old dashboard process is not a production target.

location = /api/health {
    proxy_pass http://127.0.0.1:8900/api/health;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_buffering off;
    proxy_cache off;
}

location = /api {
    proxy_pass http://127.0.0.1:8900/api;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header Authorization $http_authorization;
    proxy_set_header Cookie $http_cookie;
    proxy_buffering off;
    proxy_cache off;
}

location ^~ /api/ {
    proxy_pass http://127.0.0.1:8900;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header Authorization $http_authorization;
    proxy_set_header Cookie $http_cookie;
    proxy_read_timeout 300s;
    proxy_send_timeout 60s;
    proxy_connect_timeout 10s;
    proxy_request_buffering off;
    proxy_buffering off;
    proxy_cache off;
}

location ^~ /assets/ {
    proxy_pass http://127.0.0.1:5899;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_cache off;
    proxy_hide_header Cache-Control;
    add_header Cache-Control "public, max-age=3600" always;
}

# Retire old AQSP, beginner, agent and archive URLs without exposing their
# legacy pages. A temporary redirect keeps rollback possible during cutover.
location ~ ^/(?:dist/)?dashboard(?:/|$|\.html$) { return 302 /$is_args$args; }
location ~ ^/(?:beginner|agent|agents|dashboard_beginner)(?:/|$|\.html$|\.py$) { return 302 /$is_args$args; }
location = /archive.html { return 302 /$is_args$args; }

# React BrowserRouter routes are served by Vite preview only.
location / {
    proxy_pass http://127.0.0.1:5899;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_read_timeout 60s;
    proxy_send_timeout 60s;
    proxy_connect_timeout 10s;
    proxy_buffering off;
    proxy_cache off;
    proxy_intercept_errors on;
    error_page 404 =200 /index.html;
    proxy_hide_header Cache-Control;
    add_header Cache-Control "no-cache" always;
}
