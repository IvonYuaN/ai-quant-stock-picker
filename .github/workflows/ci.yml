name: CI

on:
  pull_request:
    paths:
      - "src/**"
      - "scripts/**"
      - "tests/**"
      - "backend/**"
      - "frontend/**"
      - "pyproject.toml"
      - ".github/workflows/**"
  push:
    branches:
      - main
      - "feat/**"
      - "fix/**"
      - "codex/**"
      - "test/**"
    paths:
      - "src/**"
      - "scripts/**"
      - "tests/**"
      - "backend/**"
      - "frontend/**"
      - "pyproject.toml"
      - ".github/workflows/**"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Upload preflight
        run: python3 -m scripts.preflight_upload

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[data,dev,web,api]"

      - name: Ruff
        run: ruff check .

      - name: Frontend build
        run: |
          npm ci --prefix frontend
          npm run build --prefix frontend

      - name: Tests
        env:
          PYTHONFAULTHANDLER: "1"
        run: pytest -q -vv --durations=20 -o faulthandler_timeout=120

      - name: Secret scan
        run: python3 scripts/check_no_secrets.py .
