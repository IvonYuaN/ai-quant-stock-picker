# A股黑名单配置
# 用于过滤不可交易或高风险的股票

blacklist:
  # ST股票（风险警示）
  # 包括 ST（一年亏损）、*ST（连续两年亏损，濒临退市）、退（已退市）、S（暂停上市）
  st_patterns:
    - "ST"
    - "*ST"
    - "退"
    - "S"

  # 手动黑名单（历史问题股）
  # 添加具体股票代码以及单独处理的特殊情况
  manual: []

  # 白名单（豁免，即使名字带ST也允许）
  # 某些股票可能有"ST"等字样但实际可交易，可加入白名单
  whitelist: []

# 流动性配置
liquidity:
  # 最低日成交额（元）- 100万元
  min_daily_amount: 1000000

  # 30日均成交量（股）- 50万股
  min_avg_volume_30d: 500000
