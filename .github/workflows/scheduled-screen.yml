name: Scheduled Stock Screening

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "open or close"
        required: false
        default: "close"
  schedule:
    # 09:10 Beijing time (UTC 01:10), Mon-Fri. 盘前观察池(open):用前一交易日数据
    - cron: "10 1 * * 1-5"
    # 15:30 Beijing time (UTC 07:30), Mon-Fri. 收盘后候选池(close):用当天日 K
    - cron: "30 7 * * 1-5"

jobs:
  screen:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      AQSP_SYMBOLS: ${{ vars.AQSP_SYMBOLS }}
      AQSP_MODE: ${{ github.event.inputs.mode || vars.AQSP_MODE || (github.event.schedule == '10 1 * * 1-5' && 'open' || 'close') }}
      AQSP_LIMIT: ${{ vars.AQSP_LIMIT || '10' }}
      AQSP_MIN_AVG_AMOUNT: ${{ vars.AQSP_MIN_AVG_AMOUNT || '50000000' }}
      AQSP_MAX_DATA_LAG_DAYS: ${{ vars.AQSP_MAX_DATA_LAG_DAYS || '3' }}
      AQSP_LEDGER: data/predictions.jsonl
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      WECHAT_WEBHOOK_URL: ${{ secrets.WECHAT_WEBHOOK_URL }}
      FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
      GENERIC_WEBHOOK_URL: ${{ secrets.GENERIC_WEBHOOK_URL }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[data]"

      - name: Restore prediction ledger
        uses: actions/cache/restore@v4
        with:
          path: data/predictions.jsonl
          key: aqsp-ledger-${{ github.run_id }}
          restore-keys: |
            aqsp-ledger-

      - name: Run screen and notify
        run: |
          aqsp run \
            --mode "${AQSP_MODE}" \
            --symbols "${AQSP_SYMBOLS}" \
            --limit "${AQSP_LIMIT}" \
            --min-avg-amount "${AQSP_MIN_AVG_AMOUNT}" \
            --max-data-lag-days "${AQSP_MAX_DATA_LAG_DAYS}" \
            --ledger "${AQSP_LEDGER}" \
            --report "reports/${AQSP_MODE}.md" \
            --output-csv "reports/${AQSP_MODE}.csv" \
            --notify

      - name: Save prediction ledger
        if: always()
        uses: actions/cache/save@v4
        with:
          path: data/predictions.jsonl
          key: aqsp-ledger-${{ github.run_id }}

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: stock-screen-${{ github.run_id }}
          path: reports/
